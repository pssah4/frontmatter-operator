name: Release

# Tag-driven release. The local release flow (bump manifest/package/versions,
# commit, annotated tag vX.Y.Z, push main + tag) triggers this workflow. It
# builds main.js from source and publishes a GitHub Release with the files
# Obsidian needs. Nothing is done by hand in the GitHub UI.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin (type-check + bundle)
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="$(jq -r .version manifest.json)"
          echo "tag=${TAG} manifest=${MANIFEST}"
          if [ "${TAG}" != "${MANIFEST}" ]; then
            echo "::error::Tag v${TAG} does not match manifest.json version ${MANIFEST}"
            exit 1
          fi

      - name: Verify build output
        run: |
          test -f main.js || { echo "::error::main.js was not built"; exit 1; }
          ls -lh main.js manifest.json styles.css versions.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: 'true'
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
          body: |
            ## Frontmatter Operator ${{ github.ref_name }}

            Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat):
            1. Install BRAT from Community Plugins.
            2. BRAT -> Add Beta Plugin -> `https://github.com/pssah4/frontmatter-operator`

            Or install manually:
            1. Download `main.js`, `manifest.json`, `styles.css` into `.obsidian/plugins/frontmatter-operator/`.
            2. Reload Obsidian.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
